plugins {
    id 'application'
    id 'jacoco' // Adiciona o plugin do JaCoCo para cobertura de código
}

repositories {
    mavenCentral()
}

dependencies {
    // Adiciona o JUnit 5 (Jupiter) para escrever os testes
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'game.core.App'
}

run {
    standardInput = System.in
}

// Configura o Gradle para usar a plataforma do JUnit 5 ao rodar a task 'test'
test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport // Pede para gerar o relatório do JaCoCo logo após rodar os testes
}

// Configura a geração do relatório visual em HTML
jacocoTestReport {
    dependsOn test // Garante que os testes rodem antes de gerar o relatório
    reports {
        html.required = true
        xml.required = false
        csv.required = false
    }
}